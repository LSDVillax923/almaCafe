<main class="pd-main" *ngIf="comida">

  <section class="pd-hero">

    <!-- TOP ROW -->
    <div class="pd-top">

      <div class="pd-info-left">
        <div class="pd-meta">
          <span class="pd-badge">{{ comida.category.name }}</span>
          <span class="pd-availability"
                [class.pd-avail--on]="comida.available"
                [class.pd-avail--off]="!comida.available">
            {{ comida.available ? '● DISPONIBLE' : '● AGOTADO' }}
          </span>
        </div>
        <h1 class="pd-title">{{ comida.name }}</h1>
        <p class="pd-description">{{ comida.description }}</p>
      </div>

      <div class="pd-price-right">
        <div class="pd-price-block">
          <div class="pd-price-label">PRECIO BASE</div>
          <div class="pd-price">$ {{ formatCOP(comida.price) }} COP</div>
        </div>
      </div>

    </div>

    <!-- BOTTOM ROW -->
    <div class="pd-bottom">

      <!-- IMAGE -->
      <div class="pd-image-wrap">
        <div class="pd-image-frame">
          <img [src]="comida.image" [alt]="comida.name" class="pd-image">
          <div class="pd-image-overlay"></div>
        </div>
        <div class="pd-corner pd-corner--tl"></div>
        <div class="pd-corner pd-corner--tr"></div>
        <div class="pd-corner pd-corner--bl"></div>
        <div class="pd-corner pd-corner--br"></div>
      </div>

      <!-- OPTIONS + BUTTON -->
      <div class="pd-options-panel">

        <div class="pd-options" *ngIf="comida.category.adicionales.length > 0">
          <h4 class="pd-options-title">
            <span class="pd-options-icon">⚙</span>
            Personaliza tu pedido
          </h4>
          <div class="pd-options-grid">
            <div class="pd-option-item"
                 *ngFor="let adicional of comida.category.adicionales"
                 [class.pd-option--selected]="isSelected(adicional.id)"
                 (click)="toggleAdicional(adicional.id)">
              <span class="pd-checkbox" [class.pd-checkbox--checked]="isSelected(adicional.id)">
                <span *ngIf="isSelected(adicional.id)">✔</span>
              </span>
              <label class="pd-option-label">
                <span class="pd-option-name">{{ adicional.name }}</span>
                <span class="pd-option-price">+$ {{ formatCOP(adicional.price) }}</span>
              </label>
            </div>
          </div>
        </div>

        <div class="pd-divider"></div>

        <button class="pd-btn-order" (click)="addToCart()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="btn-label">AGREGAR AL CARRITO</span>
          <span class="btn-total">$ {{ formatCOP(total) }} COP</span>
        </button>

      </div>

    </div>
  </section>

  <!-- RECOMMENDATIONS -->
  <section class="pd-recs-section" *ngIf="recomendaciones.length > 0">
    <div class="pd-recs-header">
      <div class="pd-recs-line"></div>
      <h3 class="pd-recs-title">También te puede interesar</h3>
      <div class="pd-recs-line"></div>
    </div>
    <div class="pd-recs-grid">
      <app-cards *ngFor="let rec of recomendaciones" [comida]="rec"></app-cards>
    </div>
  </section>

</main>

<div class="toast-notification" [class.show]="showToast">
  ✔ Producto agregado al carrito
</div>
