<div class="form-group" [class.full-width]="fullWidth">
  <label [for]="id">{{ label }}</label>

  <ng-container *ngIf="iconType !== 'none'; else plainInput">
    <div class="input-icon-wrapper">

      <svg *ngIf="iconType === 'user'"
           class="input-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#555" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>

      <svg *ngIf="iconType === 'lock'"
           class="input-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#555" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>

      <svg *ngIf="iconType === 'email'"
           class="input-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#555" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 4l-10 8L2 4"/>
      </svg>

      <svg *ngIf="iconType === 'phone'"
           class="input-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#555" stroke-width="1.5">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>

      <svg *ngIf="iconType === 'location'"
           class="input-icon" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#555" stroke-width="1.5">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>

      <input
        [type]="type"
        [id]="id"
        [name]="name"
        [placeholder]="placeholder"
        [required]="required"
        [attr.autofocus]="autofocus || null"
        [value]="value"
        [class.input-error]="errorMsg"
        (input)="onInput($event)">
    </div>
  </ng-container>

  <ng-template #plainInput>
    <input
      class="plain-input"
      [type]="type"
      [id]="id"
      [name]="name"
      [placeholder]="placeholder"
      [required]="required"
      [attr.autofocus]="autofocus || null"
      [value]="value"
      (input)="onInput($event)">
  </ng-template>

  <span *ngIf="errorMsg" class="field-error">{{ errorMsg }}</span>
</div>
